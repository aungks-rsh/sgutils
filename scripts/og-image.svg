<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDFCF9"/>
      <stop offset="1" stop-color="#F5EFEC"/>
    </linearGradient>
    <symbol id="star" viewBox="-16 -16 32 32">
      <path d="M 0 -16 L 3.53 -4.85 L 15.22 -4.94 L 5.71 1.85 L 9.41 12.94 L 0 6 L -9.41 12.94 L -5.71 1.85 L -15.22 -4.94 L -3.53 -4.85 Z"/>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft red corner wedge -->
  <path d="M 1200 0 L 1200 280 L 920 0 Z" fill="#EE2536" opacity="0.06"/>

  <!-- Singapore flag motif: crescent + 5 stars in red, top right -->
  <g transform="translate(960, 170)">
    <!-- Crescent (opening to the right, toward the stars) -->
    <circle cx="0" cy="0" r="48" fill="#EE2536"/>
    <circle cx="16" cy="-5" r="42" fill="#FDFCF9"/>

    <!-- 5 stars on a pentagon of radius 55 around (130, 0) -->
    <g fill="#EE2536" transform="translate(130, 0)">
      <use href="#star" x="0" y="-55" width="32" height="32" transform="translate(-16, -16)"/>
      <use href="#star" x="52" y="-17" width="32" height="32" transform="translate(-16, -16)"/>
      <use href="#star" x="32" y="44" width="32" height="32" transform="translate(-16, -16)"/>
      <use href="#star" x="-32" y="44" width="32" height="32" transform="translate(-16, -16)"/>
      <use href="#star" x="-52" y="-17" width="32" height="32" transform="translate(-16, -16)"/>
    </g>
  </g>

  <!-- Red underline accent -->
  <rect x="90" y="230" width="160" height="6" rx="3" fill="#EE2536"/>

  <!-- Brand -->
  <text x="90" y="360"
    font-family="Helvetica, Arial, sans-serif"
    font-size="148" font-weight="900" fill="#1A1A1A"
    letter-spacing="-4">sgutils</text>

  <!-- Subtitle -->
  <text x="95" y="430"
    font-family="Helvetica, Arial, sans-serif"
    font-size="40" font-weight="400" fill="#555">Free utilities for Singapore</text>

  <!-- Tool list / footer -->
  <text x="95" y="560"
    font-family="Helvetica, Arial, sans-serif"
    font-size="26" font-weight="500" fill="#888"
    letter-spacing="1">NRIC · FIN · datetime · and more</text>
</svg>
